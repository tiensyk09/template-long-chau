name = "korean-news"
main = ".open-next/worker.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "korean-news-db"
database_id = "PLACEHOLDER"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "korean-news-bucket"
